<div class="relative w-full min-h-screen flex flex-col bg-base-background overflow-hidden">
  <div class="bar top-bar w-full p-2 bg-black/15 z-50" [ngStyle]="{ height: barHeight }">
    <!-- large screen navbar  -->
    <div class="navbar relative items-center gap-4 w-full h-full hidden sm:flex">
      <div class="icon absolute left-0">
        <fa-icon class="fa-icon" [icon]="Icons.faDollarSign"></fa-icon>
      </div>
      <div class="title w-full text-center text-white">{{ title }}</div>
      <div class="controls flex absolute right-0 gap-2">
        <div class="minimize">
          <fa-icon class="fa-icon" [icon]="Icons.faWindowMinimize"></fa-icon>
        </div>
        <div class="maximize">
          <fa-icon class="fa-icon" [icon]="Icons.faExpand"></fa-icon>
        </div>
        <div class="close">
          <fa-icon class="fa-icon" [icon]="Icons.faX"></fa-icon>
        </div>
      </div>
    </div>


    <!-- small screen navbar  -->
    <div class="navbar relative  items-center gap-4 w-full h-full flex sm:hidden z-50">
      <div class="icon absolute left-0">
        <fa-icon class="fa-icon" [icon]="Icons.faDollarSign"></fa-icon>
      </div>
      <div class="title w-full text-center text-white">{{ title }}</div>
      @if (Navbar) {
        <div class="absolute right-0" (click)="toggleMobileNavbar()">
          <fa-icon class="fa-icon cursor-pointer" [icon]="Icons.faNavicon"></fa-icon>
        </div>

        @if (showMobileNavbar()) {
          <div
            class="absolute right-0 top-14
                  w-60 rounded-2xl
                  border border-white/10
                  bg-black/70 backdrop-blur-2xl
                  overflow-hidden
                  shadow-[0_0_40px_rgba(0,255,120,0.15)]">

            <!-- Glow -->
            <div
              class="absolute inset-0 opacity-40 blur-2xl
                    bg-[conic-gradient(from_180deg,_theme(colors.code-green),_transparent,_transparent)]">
            </div>

            <div class="relative flex flex-col p-2">

              <a
                href="#"
                class="mobile-link flex items-center gap-3
                      px-4 py-3 rounded-xl
                      text-white/80 hover:text-white
                      hover:bg-white/5
                      transition-all duration-300">

                <fa-icon [icon]="Icons.faHouse"></fa-icon>
                <span>Home</span>
              </a>

              <a
                href="#"
                class="mobile-link flex items-center gap-3
                      px-4 py-3 rounded-xl
                      text-white/80 hover:text-white
                      hover:bg-white/5
                      transition-all duration-300">

                <fa-icon [icon]="Icons.faUser"></fa-icon>
                <span>About</span>
              </a>

              <a
                href="#"
                class="mobile-link flex items-center gap-3
                      px-4 py-3 rounded-xl
                      text-white/80 hover:text-white
                      hover:bg-white/5
                      transition-all duration-300">

                <fa-icon [icon]="Icons.faEnvelope"></fa-icon>
                <span>Contact</span>
              </a>

            </div>
          </div>
        }
      }@else {
        <div class="controls flex absolute right-0 gap-2">
          <div class="minimize">
            <fa-icon class="fa-icon" [icon]="Icons.faWindowMinimize"></fa-icon>
          </div>
          <div class="maximize">
            <fa-icon class="fa-icon" [icon]="Icons.faExpand"></fa-icon>
          </div>
          <div class="close">
            <fa-icon class="fa-icon" [icon]="Icons.faX"></fa-icon>
          </div>
        </div>
      }
    </div>
  </div>

  <!-- Left Bar -->
   @if (Navbar) {
     <div class="hidden sm:block left-bar h-full p-2 bg-black/15 z-50 absolute left-0" [ngStyle]="{ width: barHeight }">
       <div class="links flex flex-col justify-center items-center w-full h-full gap-4">
           <div class="relative group w-fit">

             <!-- Tooltip -->
             <div
               class="absolute left-[180%] top-1/2 -translate-y-1/2
                     whitespace-nowrap
                     rounded-lg px-4 py-1
                     bg-code-green text-black
                     text-sm font-semibold
                     opacity-0 invisible
                     translate-x-[-10px]
                     transition-all duration-300
                     group-hover:opacity-100
                     group-hover:visible
                     group-hover:translate-x-0">

               Home
             </div>

             <!-- Icon -->
             <fa-icon
               class="fa-icon cursor-pointer"
               [icon]="Icons.faHouse">
             </fa-icon>

           </div>
           <div class="relative group w-fit">

             <!-- Tooltip -->
             <div
               class="absolute left-[180%] top-1/2 -translate-y-1/2
                     whitespace-nowrap
                     rounded-lg px-4 py-1
                     bg-code-green text-black
                     text-sm font-semibold
                     opacity-0 invisible
                     translate-x-[-10px]
                     transition-all duration-300
                     group-hover:opacity-100
                     group-hover:visible
                     group-hover:translate-x-0">

               About
             </div>

             <!-- Icon -->
             <fa-icon
               class="fa-icon cursor-pointer"
               [icon]="Icons.faUser">
             </fa-icon>

           </div>
           <div class="relative group w-fit">

             <!-- Tooltip -->
             <div
               class="absolute left-[180%] top-1/2 -translate-y-1/2
                     whitespace-nowrap
                     rounded-lg px-4 py-1
                     bg-code-green text-black
                     text-sm font-semibold
                     opacity-0 invisible
                     translate-x-[-10px]
                     transition-all duration-300
                     group-hover:opacity-100
                     group-hover:visible
                     group-hover:translate-x-0">

               Contact Us
             </div>

             <!-- Icon -->
             <fa-icon
               class="fa-icon cursor-pointer"
               [icon]="Icons.faEnvelope">
             </fa-icon>

           </div>
       </div>
     </div>
   }

  <div class="content w-full h-full flex-1 p-4 flex flex-col items-center justify-center">
    <!-- Content comes from parent -->
    <ng-content></ng-content>
  </div>
  <div class="bottom-bar w-full flex justify-between bg-black/15 p-1 items-center z-50" [ngStyle]="{ height: barHeight }">
    <div class="icon ">
      <fa-icon class="fa-icon" [icon]="Icons.faDotCircle"></fa-icon>
    </div>
    <div class="social-icons flex gap-1">
      <a href="#" class="social-icon" alt="GitHub">
        <fa-icon [icon]="Icons.faGithub"></fa-icon>
      </a>
      <a href="#" class="social-icon" alt="LinkedIn">
        <fa-icon [icon]="Icons.faLinkedin"></fa-icon>
      </a>
    </div>
  </div>
  <!-- Conical Background -->
<div
  class="absolute bottom-[-15%] left-[-5%]
         w-[35%] aspect-square rounded-full
         blur-[80px] opacity-50
         bg-[conic-gradient(from_0deg,_theme(colors.code-green),_transparent)]">
</div>
<div
  class="absolute top-[-15%] right-[-5%]
         w-[40%] aspect-square rounded-full
         blur-3xl opacity-50
         bg-[conic-gradient(from_0deg,_theme(colors.code-green),_transparent)]">
</div>
